app = 'tocky-api'
primary_region = 'sin'

[build]

[deploy]
release_command = 'sh -c "uv run alembic upgrade head && uv run python -m app.seed"'

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = 'off'
auto_start_machines = true
min_machines_running = 1

[[vm]]
memory = '2gb'
cpu_kind = 'shared'
cpus = 2

[checks]
[checks.health]
type = 'http'
port = 8000
path = '/health/'
interval = '30s'
timeout = '5s'
